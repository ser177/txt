mode: rule
# Proxy Mode: TPROXY
tproxy-port: 7894
ipv6: true
udp: true
geodata-mode: true #добавил
geodata-loader: memconservative # Опционально: экономит оперативную память
# log-level: debug  error silent
log-level: error
allow-lan: false
unified-delay: true
tcp-concurrent: true
external-controller: 0.0.0.0:9090
external-ui: ./ui
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip'

# DNS server settings
# This section is optional. When not present, the DNS server will be disabled.

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip  # рекомендуется для производительности
  fake-ip-range: 198.18.0.1/16
  
  fake-ip-filter:
   # ---- БАЗОВЫЕ ИСКЛЮЧЕНИЯ (рекомендуется оставить) ----
   - "*.lan"
   - "*.local"
   - "*.arpa"
   - "*.msftncsi.com"
   - "*.msftconnecttest.com"
   # ---- ОСНОВНОЕ ПРАВИЛО ДЛЯ РОССИЙСКОГО ТРАФИКА ----
   # Эта строчка заставляет Mihomo НЕ подменять IP для всего, что попадает под "cn" категорию
 #  - "geosite:cn"   # <--- ДОБАВЬТЕ ЭТУ СТРОКУ
   - "geoip:cn"     # <--- И ЭТУ СТРОКУ
 #  - "geosite:ru"   # <--- ДОБАВЬТЕ ЭТУ СТРОКУ
   - "geoip:ru"     # <--- И ЭТУ СТРОКУ
    
  # Bootstrap DNS (для разрешения адресов DoH-серверов) — должен быть доступен напрямую
  default-nameserver:
    - 77.88.8.8
    - 8.8.8.8
  
  # Основные DNS с указанием #PROXY — запросы пойдут через прокси
  nameserver:
    - https://dns.google/dns-query#PROXY
    - https://cloudflare-dns.com/dns-query#PROXY
    # Резервные прямые DNS (на случай, если прокси недоступен)
    - 77.88.8.8
    - 8.8.8.8
  
  # DNS для разрешения адресов ПРОКСИ-СЕРВЕРОВ — ТОЛЬКО прямые!
  # Это критически важно, чтобы избежать циклической зависимости
  proxy-server-nameserver:
    - 77.88.8.8
    - 8.8.8.8
  
  # Прямые DNS для исключений
  direct-nameserver:
    - 77.88.8.8
    - 8.8.8.8
  
  # Политика: для определённых доменов используем определённые DNS
  nameserver-policy:
    'geosite:telegram,google,cloudflare':
      - https://dns.google/dns-query#PROXY
      - https://cloudflare-dns.com/dns-query#PROXY
  #  'geosite:cn':
  #    - 223.5.5.5
  #    - 119.29.29.29
      
  fallback:
    - 77.88.8.8   # Яндекс DNS
    - 8.8.8.8     # Google DNS
    - 1.1.1.1     # Cloudflare DNS

profile:
  store-selected: true
  store-fake-ip: true

# Provides a default traffic mark for outbound connections on Linux
routing-mark: 2 # Prevent cyclic redirection

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
  skip-domain:
    - 'Mijia Cloud'
    - '+.lan'
    - '+.local'
    - '+.push.apple.com'
    - '+.apple.com'

