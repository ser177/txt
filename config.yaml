proxy-groups:
  - name: 🛡️ VPN
    type: select
    proxies:
      - ⚡️ Авто
    include-all: true


  - name: 📺 Youtube
    type: select
    include-all: true
    proxies:
      - ⚡️ Авто


  - name: TelegramPROXY
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    type: url-test
    include-all: true
    url: "http://91.108.56.115/generate_204"
    lazy: true          # ← ДОБАВИТЬ
    interval: 300
    exclude-filter: '(?i)(обход|\.ru|-ru|россия|москва)'

  - name: ⚡️ Авто
    type: url-test
    tolerance: 150
    url: 'https://www.gstatic.com/generate_204'
    lazy: true          # ← ДОБАВИТЬ
    interval: 300
    include-all: true
    hidden: true
    # exclude-filter: '🇷🇺|Russia|Россия|Обход|Осталось|Игры'

  - name: PROXY
    type: select
    hidden: true
    proxies:
      - 🛡️ VPN

  - name: 🔓 Без VPN
    type: select
    hidden: true
    proxies:
      - DIRECT
      

