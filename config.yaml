  - RULE-SET,oisd_big,REJECT
  - RULE-SET,oisd_nsfw_small,REJECT
  - RULE-SET,oisd_nsfw_big,REJECT
  
  # ========== PRIVATE / ЛОКАЛЬНЫЕ (DIRECT) ==========
  - RULE-SET,private-ips,DIRECT,no-resolve      # geoip:private
  - RULE-SET,private-domains,DIRECT             # geosite:private
  
  # ========== РУЧНЫЕ ДИРЕКТ-ДОМЕНЫ ==========
  - DOMAIN-SUFFIX,taobao.com,DIRECT
  - DOMAIN-SUFFIX,ali.cdn,DIRECT                # или DOMAIN,ali.cdn если точное совпадение
  - DOMAIN-SUFFIX,1688.com,DIRECT
  - DOMAIN-SUFFIX,wechat.com,DIRECT
  
  # ========== ГЕО IP (DIRECT для RU и CN) ==========
